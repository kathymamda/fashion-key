<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar | Fashion Key</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 3rem;">
                <a href="/" class="serif" style="font-size: 1.5rem; letter-spacing: 5px;">FASHION KEY</a>
                <p class="serif" style="font-size: 0.8rem; margin-top: 0.5rem; color: var(--accent);">Bienvenido de nuevo</p>
            </div>
            <form action="/dashboard">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Iniciar Sesión</button>
            </form>
            <div style="text-align: center; margin-top: 2rem; font-size: 0.8rem;">
                <p>¿No tienes una cuenta? <a href="/register" style="text-decoration: underline;">Regístrate</a></p>
            </div>
        </div>
    </div>
</body>
</html>
